<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Photos ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs for messaging -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="moments.html">Moments</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="chat.html">Chat</a>
            <a href="timeline.html">Timeline</a>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>

    <div id="hedlinecontainer" style="margin: 2rem auto; text-align: center;">
        <div id="shine">Our Memory Gallery ❤️</div>
    </div>

    <div style="text-align: center; margin: 1rem; color: var(--text-light);">
        <p id="photoCount">Loading gallery...</p>
    </div>

    <!-- Gallery Controls -->
    <div style="display: flex; justify-content: center; gap: 1rem; margin: 1rem; flex-wrap: wrap;">
        <button id="gridViewBtn" class="upload-btn active" style="background: var(--primary-pink);">
            <i class="fas fa-th"></i> Grid View
        </button>

        <button id="slideshowBtn" class="slideshow-btn">
            <i class="fas fa-play"></i> Start Slideshow
        </button>
        
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" style="text-align: center; padding: 2rem; display: none;">
        <div class="loading-spinner"></div>
        <p style="margin-top: 1rem;">Loading images...</p>
    </div>
    
    <!-- Gallery Container -->
    <div class="grid-gallery" id="photoGrid">
        <!-- Photos will load here -->
    </div>
    
    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox-modal" style="display: none;">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-prev"><i class="fas fa-chevron-left"></i></span>
        <span class="lightbox-next"><i class="fas fa-chevron-right"></i></span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Gallery image">
            <div class="lightbox-info">
                <div id="lightbox-caption" class="lightbox-caption"></div>
                <div id="lightbox-meta" class="lightbox-meta"></div>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <div class="music-player">
        <button class="music-toggle" id="musicToggle">🎵</button>
        <audio id="bgMusic" loop>
            <source src="audio/bg_audio.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-services.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/gallery.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            window.auth.logout();
        });

        // Music player
        document.addEventListener('DOMContentLoaded', function() {
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');
            
            if (musicToggle && bgMusic) {
                let isPlaying = false;
                
                bgMusic.addEventListener('error', function() {
                    console.log('Background music file not found');
                });
                
                musicToggle.addEventListener('click', function() {
                    if (isPlaying) {
                        bgMusic.pause();
                        musicToggle.textContent = '🎵';
                    } else {
                        bgMusic.play().catch(e => console.log('Autoplay prevented:', e));
                        musicToggle.textContent = '⏸️';
                    }
                    isPlaying = !isPlaying;
                });
            }
        });
    </script>
</body>
</html>

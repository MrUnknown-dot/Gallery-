<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
</head>

<body>
    <nav class="nav-bar">
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="moments.html">Moments</a>
            <a href="gallery.html">Gallery</a>
            <a href="chat.html" class="active">Chat</a>
            <a href="timeline.html">Timeline</a>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>

    <div class="chat-container"
        style="max-width: 100%; height: calc(100vh - 80px); margin: 0; border-radius: 5;padding-bottom: 20;">
        <div class="chat-header" style="border-radius: 0;">
            <h3>💬 Private Chat</h3>
            <div class="online-status">
                <span class="status-dot" id="onlineStatusDot"></span>
                <span>Online</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages" style="height: calc(100vh - 180px);">
            <!-- Messages will appear here -->
        </div>

        <div class="typing-indicator" id="typingIndicator" style="display: none;"></div>

        <div class="chat-input-container">
            <div class="input-wrapper" style="position: relative; width: 100%;">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." maxlength="500">


                <button class="music-toggle" id="musicToggle">🎵</button>
                <audio id="bgMusic" loop>
                    <source src="audio/bg_audio.mp3" type="audio/mpeg">
                </audio>


                <button class="send-btn" id="sendMessage">
                    <i class="fas fa-paper-plane"></i>
                </button>

            </div>
        </div>
    </div>


    <!-- Push Notification Container -->
    <div id="pushNotificationContainer" class="push-notification-container"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-services.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', function () {
            window.auth.logout();
        });

        // Music player with error handling
        document.addEventListener('DOMContentLoaded', function () {
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');

            if (musicToggle && bgMusic) {
                let isPlaying = false;

                bgMusic.addEventListener('error', function () {
                    console.log('Background music file not found');
                    musicToggle.style.opacity = '0.5';
                    musicToggle.title = 'Music file not found';
                });

                musicToggle.addEventListener('click', function () {
                    if (isPlaying) {
                        bgMusic.pause();
                        musicToggle.textContent = '🎵';
                    } else {
                        bgMusic.play().catch(e => {
                            console.log('Could not play music:', e);
                            musicToggle.textContent = '🔇';
                        });
                        musicToggle.textContent = '⏸️';
                    }
                    isPlaying = !isPlaying;
                });
            }
        });
    </script>
</body>

</html>
